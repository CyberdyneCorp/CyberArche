<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#151310" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f6f4f0" media="(prefers-color-scheme: light)" />
		<link rel="icon" href="/icons/favicon.png" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="CyberArche" />
		<title>CyberArche</title>
		<script>
			// Apply the persisted theme before first paint (no flash).
			const theme = localStorage.getItem('cyberarche.theme');
			if (theme === 'dark') document.documentElement.dataset.theme = 'dark';
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
